<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
        <div class="container">
            <h1 class="main-title">
                <i class="fas fa-sun-cloud"></i> Async Weather Tracker
            </h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>
                <br>
                <br>
                <h3>Search History</h3>
                <div class="history" id="history"></div>
            </div>

            <div class="card">
                <h3><i class="fas fa-cloud-sun"></i> Weather Info</h3>
                <div id="loading" class="loading" style="display:none;">
                    <i class="fas fa-spinner fa-spin"></i> Loading weather...
                </div>
                <div id="weather"></div>
            </div>
        </div>

        <!-- <div class="card">
            <h3>Console – Event Loop</h3>
            <div class="console" id="console"></div>
        </div> -->

    </div>

    <script src="./script.js"></script>
</body>

</html>
